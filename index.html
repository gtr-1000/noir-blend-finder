<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOIR Blend Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">

        <h1>NOIR Blend Finder</h1>

        <p class="subtitle">
            Discover the coffee blend that matches your taste
        </p>

        <section class="card">

            <h2>Roast Intensity</h2>

            <label>
                <input type="radio" name="intensity" value="light">
                Light
            </label>

            <label>
                <input type="radio" name="intensity" value="medium">
                Medium
            </label>

            <label>
                <input type="radio" name="intensity" value="strong">
                Strong
            </label>

            <label>
                <input type="radio" name="intensity" value="very strong">
                Very Strong    
            </label>

        </section>

        <section class="card">

            <h2>Brewing Method</h2>

            <label>
                <input type="radio" name="method" value="espresso">
                Espresso
            </label>

            <label>
                <input type="radio" name="method" value="v60">
                V60
            </label>

            <label>
                <input type="radio" name="method" value="french">
                French Press
            </label>

        </section>

        <button id="recommend-btn">
            Find My Blend
        </button>

        <section id="result-card">

            <h2>Your Recommendation</h2>

            <h3 id="blend-name">
                —
            </h3>

            <p id="blend-notes">
                Choose your preferences and click the button.
            </p>

        </section>

    </main>

    <script src="script.js"></script>

</body>
</html>
